<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Signup - YouTube Clone</title>

    <link rel="stylesheet" href="../index.css">
    <link rel="stylesheet" href="../styles/signup.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

    <div class="auth-box">

        <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/YouTube_Logo_2017.svg" class="auth-logo">

        <h3>Signup</h3>

        <div class="input-group">
            <i class="fa-solid fa-user"></i>
            <input type="text" id="signupName" placeholder="Name">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-envelope"></i>
            <input type="email" id="signupEmail" placeholder="Email">
        </div>

        <div class="input-group">
            <i class="fa-solid fa-lock"></i>
            <input type="password" id="signupPassword" placeholder="Password">
        </div>

        <p id="signupError" class="error"></p>

        <button onclick="signup()">Signup</button>

        <p>Already have account? <a href="./login.html">Login</a></p>

    </div>

    <script src="../auth.js"></script>
    <div id="successModal" class="modal-overlay">

        <div class="modal-box">

            <i class="fa-solid fa-circle-check success-icon"></i>

            <h3>Registration Successful</h3>

            <p>Your account has been created successfully.</p>

            <button onclick="goToLogin()">Go to Login</button>

        </div>

    </div>

</body>

</html>
